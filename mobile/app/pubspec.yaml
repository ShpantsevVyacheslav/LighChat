name: lighchat_mobile
description: "LighChat — приватный мессенджер с E2E-шифрованием, QR-мульти-девайс, аудио/видеозвонками, видеоконференциями, играми в чате и секретными чатами. Альтернатива WhatsApp и Telegram для iOS и Android."
homepage: https://lighchat.online
repository: https://github.com/ShpantsevVyacheslav/LighChat
issue_tracker: https://github.com/ShpantsevVyacheslav/LighChat/issues
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.4

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  go_router: ^16.0.0
  app_links: ^6.4.0
  flutter_riverpod: ^3.0.0

  image_picker: any
  image_cropper: any
  image: any

  # Используется DevicesScreen для fingerprint (SHA-256 от publicKeySpki).
  # Уже доступен транзитивно, но объявляем явно (depend_on_referenced_packages).
  crypto: ^3.0.3

  # Транзитивный через flutter_cache_manager — нужен прямым, чтобы экран
  # «Хранилище» мог читать flutter_cache_manager-вскую базу
  # `chat_image_cache.db` и сопоставлять имена файлов (UUID) с url для
  # атрибуции к чату. См. `LocalCacheEntryRegistry.readImageContextSyncForFileName`.
  sqflite: any

  # Versions are managed via `flutter pub add` to match Flutter SDK.
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  cloud_functions: any
  firebase_storage: any
  firebase_messaging: any
  firebase_crashlytics: any
  # Продуктовая/маркетинговая аналитика. На Windows/Linux SDK не доступен —
  # туда события уходят через httpsCallable `logAnalyticsEvent`
  # (см. mobile/app/lib/features/analytics/analytics_service.dart).
  firebase_analytics: any
  # [audit CR-002] App Check для iOS App Attest + Android Play Integrity.
  firebase_app_check: any
  timezone: any
  logger: any

  lighchat_models:
    path: ../packages/lighchat_models
  lighchat_firebase:
    path: ../packages/lighchat_firebase
  lighchat_ui:
    path: ../packages/lighchat_ui

  google_fonts: any
  flutter_svg: any
  flutter_callkit_incoming: ^3.0.0
  video_player: any
  ffmpeg_kit_min_gpl: ^6.0.3+2-LTS
  just_audio: ^0.10.5
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1
  file_picker: ^11.0.2
  geolocator: ^13.0.2
  # Геокодинг адреса в lat/lon через нативные iOS CLGeocoder / Android
  # Geocoder. Нужен для deeplink-ов такси (Яндекс Go / Uber требуют
  # координаты, не текст адреса).
  geocoding: ^4.0.0
  camera: ^0.11.0+2
  visibility_detector: ^0.4.0+2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  http: ^1.6.0
  html: ^0.15.6
  share_plus: ^11.0.0
  permission_handler: ^11.3.1
  gal: ^2.3.2
  shared_preferences: ^2.5.3
  emoji_picker_flutter: ^4.1.0
  flutter_contacts: ^2.0.2
  flutter_webrtc: ^1.2.0
  record: ^6.1.2
  path_provider: ^2.1.5
  # On-device перевод сообщений / транскриптов голосовых. Модели качаются
  # с mlkit.gstatic.com (~30 МБ на языковую пару), дальше работают офлайн.
  # Поддерживает основные языки приложения, кроме kk/uz.
  google_mlkit_translation: ^0.13.0
  # On-device выделение в тексте телефонов, email, дат, адресов, IBAN,
  # treking-номеров и т.п. — для quick-actions в чате.
  google_mlkit_entity_extraction: ^0.15.0
  # On-device Smart Reply: предлагает 1-3 коротких ответа («Sure», «OK!»,
  # «Sounds good!») на основе последних 10 сообщений диалога. Модель встроена
  # в SDK, ничего качать не нужно. Поддерживает английский (для других языков —
  # эвристика «если разговор похож на английский»).
  google_mlkit_smart_reply: ^0.13.1
  # Native «Добавить в календарь» (без runtime-permissions): открывает
  # системный календарь iOS/Android с пред-заполненными title/start/end/
  # description. Пользователь сам подтверждает в нативном UI.
  add_2_calendar: ^3.0.1
  # Material You (Android 12+): акценты приложения подстраиваются под
  # цветовую гамму системных обоев. На iOS / старом Android — fallback
  # на наш дефолтный ColorScheme.
  dynamic_color: ^1.7.0
  super_clipboard: ^0.9.1
  super_drag_and_drop: ^0.9.1
  receive_sharing_intent: ^1.8.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  flutter_local_notifications: ^21.0.0
  flutter_windowmanager_plus: ^1.0.0
  intl: any
  local_auth: ^2.3.0
  # Native Apple Sign-In для iOS + macOS. Использует SDK Apple вместо
  # `_auth.signInWithProvider` (который не реализован в firebase_auth_macos).
  # Возвращает identityToken, конвертируется в Firebase OAuthCredential.
  sign_in_with_apple: ^6.1.0
  flutter_secure_storage: ^9.2.4
  battery_plus: ^6.2.1
  syncfusion_flutter_pdfviewer: ^31.1.21
  path: ^1.9.0

  # Desktop (macOS / Windows / Linux). Не используются на iOS/Android — guard
  # вызовы через PlatformCapabilities.isDesktop.
  window_manager: ^0.5.1
  tray_manager: ^0.5.1
  launch_at_startup: ^0.5.1
  desktop_drop: ^0.6.0
  fl_chart: ^1.1.1
  screen_retriever: ^0.2.0
  auto_updater: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # In-memory Firestore fake — используется в meeting-чат-репозитории
  # для unit-тестов writes (reactions, replyTo) без сети.
  fake_cloud_firestore: ^3.1.0

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Используется CI workflow .github/workflows/desktop.yml для упаковки
  # Windows-сборки в MSIX. Не используется в runtime, не попадает в bundle.
  msix: ^3.16.10

  # Генерирует иконки приложения для всех платформ из единого PNG-источника
  # (`assets/lighchat_mark.png`). Запуск: `dart run flutter_launcher_icons`.
  # Конфигурация — внизу файла в секции `flutter_launcher_icons:`.
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/lighchat_mark.png"
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/lighchat_mark.png"
  windows:
    generate: true
    image_path: "assets/lighchat_mark.png"
    # Windows .ico max size — 256. flutter_launcher_icons сам downscale-ит
    # от 1024-source.
    icon_size: 256
  web:
    generate: false
  remove_alpha_ios: true
  background_color_ios: "#0A0E17"

msix_config:
  display_name: LighChat
  publisher_display_name: LighChat
  identity_name: com.lighchat.LighChat
  msix_version: 1.0.0.0
  logo_path: assets/lighchat_mark.png
  capabilities: internetClient, microphone, webcam, location
  protocol_activation: lighchat

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true
  assets:
    - assets/lighchat_mark.png
    - assets/lighchat_wordmark.png
    - assets/google_icon.png
    - assets/services/
    - assets/legal/ru/
    - assets/legal/en/
    - assets/wallpapers/
    - assets/audio/ringtones/
    - assets/audio/conference/

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
