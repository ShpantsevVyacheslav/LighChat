name: lighchat_firebase
description: "A new Flutter package project."
version: 0.0.1
homepage:
publish_to: 'none'

environment:
  sdk: ^3.11.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  cloud_functions: any
  firebase_messaging: any
  firebase_storage: any

  # Apple Sign-In native flow для iOS/macOS — см.
  # `auth_repository.dart::signInWithApple`. Возвращает identityToken,
  # конвертируется в Firebase OAuthCredential.
  sign_in_with_apple: ^6.1.0
  crypto: any

  lighchat_models:
    path: ../lighchat_models

  logger: any

  # E2EE v2 — crypto primitives (Phase 3). `pointycastle` даёт чистый Dart
  # набор алгоритмов (ECDH P-256, AES-GCM, HKDF-SHA-256), 100% совместимых с
  # WebCrypto при аккуратной обвязке. Мы специально ушли от `cryptography`
  # (pure-Dart Ecdh.p256 там бросает UnimplementedError).
  # `flutter_secure_storage` хранит приватник в Keychain/Keystore.
  pointycastle: ^4.0.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
