# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# The runtime to use
runtime: nodejs20

# The command to start your app
start:
  run: npm start

runConfig:
  # [audit L-009] Явные scaling/runtime constraints — не полагаемся на
  # дефолты App Hosting. `maxInstances: 5` = верхний потолок против
  # runaway-scale (DoS / выстрелившая регрессия с infinite-loop).
  # `minInstances: 0` сохраняет cold-start savings (нет idle оплаты).
  # При росте трафика — поднимать руками с мониторингом latency/cost.
  maxInstances: 5
  minInstances: 0
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # GIPHY API key для прокси /api/giphy/search.
  # Создать секрет:  firebase apphosting:secrets:set GIPHY_API_KEY
  # Дать доступ:     firebase apphosting:secrets:grantaccess GIPHY_API_KEY --backend <BACKEND_ID>
  - variable: GIPHY_API_KEY
    secret: GIPHY_API_KEY
    availability:
      - RUNTIME

  # HMAC-ключ для Server Action ID в Next.js. Должен совпадать на этапе
  # `next build` и в рантайме SSR — иначе клиент при POST на Server Action
  # получит UnrecognizedActionError ("Server action not found"). Без пина
  # Next генерирует ключ заново на каждом билде → action IDs дрейфуют.
  # Создать секрет:  firebase apphosting:secrets:set NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
  # Дать доступ:     firebase apphosting:secrets:grantaccess NEXT_SERVER_ACTIONS_ENCRYPTION_KEY --backend <BACKEND_ID>
  - variable: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
    secret: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
    availability:
      - BUILD
      - RUNTIME
