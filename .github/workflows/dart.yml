# [audit L-001] Flutter CI для mobile/app/. До правки workflow запускал
# `dart pub get` на корне репо (где нет pubspec.yaml) — фактически проверка
# не работала.

name: Flutter

on:
  push:
    branches: ["main"]
    paths:
      - "mobile/app/**"
      - ".github/workflows/dart.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "mobile/app/**"
      - ".github/workflows/dart.yml"

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Flutter CI пока **advisory** (continue-on-error) — в mobile/app/
      # накопились pre-existing type-errors (chat_list_screen.dart:1861
      # `undefined_getter displayName`, etc.), не связанные с задачами
      # текущего аудита. Гейт даёт видимость в Actions UI, но не блокирует
      # PR. Когда пройдёмся по audit M-013 / mobile-debt — поднимем до
      # обязательного.
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Tests
        run: flutter test
        continue-on-error: true
