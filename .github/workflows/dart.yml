# [audit L-001] Flutter CI для mobile/app/. До правки workflow запускал
# `dart pub get` на корне репо (где нет pubspec.yaml) — фактически проверка
# не работала.

name: Flutter

on:
  push:
    branches: ["main"]
    paths:
      - "mobile/app/**"
      - ".github/workflows/dart.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "mobile/app/**"
      - ".github/workflows/dart.yml"

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test
