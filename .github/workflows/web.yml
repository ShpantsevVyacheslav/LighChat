# [audit L-001] Гейты для web (Next.js): typecheck + lint + vitest + build.
# Раньше единственным workflow был dart.yml, который запускал dart pub get на
# корне репо (где нет pubspec.yaml) — то есть PR в main мерджились без
# верификации.

name: Web CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # `--legacy-peer-deps` — у проекта несколько peer-dep конфликтов в зрелых
      # деревьях (electron-builder × electron etc.), но `npm ci` без флага
      # ругается. Это та же конфигурация, что в App Hosting build.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      # `next build` на CI без секретов: `apphosting.yaml`/Vercel-secrets не
      # подгружаются, поэтому используем заглушки для Firebase config (build
      # не требует реальных значений — только что переменные определены).
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-stub
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.example.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-stub
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-stub.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:ci"
