name: Desktop (Flutter)

# Сборка Flutter-десктопа для macOS / Windows / Linux. Запускается на
# каждом теге v* (release), а также вручную через workflow_dispatch.
#
# Подписи (Apple Developer ID, Windows EV cert) и notarization
# подключаются через GitHub Secrets — пока не настроены, артефакты
# выкладываются без подписи (на macOS — adhoc, на Windows — SmartScreen
# warning). Для пользовательского release-flow сначала настройте секреты,
# затем уберите `if: false` в соответствующих шагах.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Тэг релиза (например v1.0.0). Без него — pre-release.'
        required: false
        default: ''

defaults:
  run:
    working-directory: mobile/app

jobs:
  build-macos:
    name: macOS DMG
    # macos-15 (Sequoia) с Xcode 16+ — нужен flutter_contacts 2.0.2,
    # который использует CNAuthorizationStatus.limited (доступно с iOS 18 /
    # macOS 14.x SDK).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # FlutterFire CLI нужен для run-script phase в Xcode:
      # "flutterfire upload-crashlytics-symbols". Без него Xcode build
      # падает на `flutterfire: command not found`.
      - name: Install FlutterFire CLI
        working-directory: .
        run: |
          dart pub global activate flutterfire_cli
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      # GitHub Actions macOS runner кеширует CocoaPods specs repo, и она
      # часто оказывается устаревшей относительно версий, требуемых
      # firebase_*/grpc/etc. Без явного `pod repo update` сборка падает:
      #   "CocoaPods's specs repository is too out-of-date to satisfy
      #    dependencies. To update the CocoaPods specs, run pod repo update".
      # Делаем repo-update раз перед flutter build (он сам потом дёрнет
      # `pod install`, который попадёт уже в актуальный кеш).
      - name: Update CocoaPods specs
        working-directory: mobile/app/macos
        run: pod repo update --silent

      - name: Build macOS app
        env:
          LANG: en_US.UTF-8
        run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "LighChat" \
            --window-pos 200 120 \
            --window-size 600 380 \
            --icon-size 100 \
            --hide-extension lighchat_mobile.app \
            --app-drop-link 425 185 \
            "LighChat-macos.dmg" \
            "build/macos/Build/Products/Release/lighchat_mobile.app"

      # TODO: notarize через xcrun notarytool — требует APPLE_ID_EMAIL,
      # APPLE_ID_PASSWORD (app-specific), APPLE_TEAM_ID секреты.

      - uses: actions/upload-artifact@v4
        with:
          name: lighchat-macos-dmg
          path: mobile/app/LighChat-macos.dmg

  build-windows:
    name: Windows portable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      # Portable ZIP — простейший способ запуска без установки. Распакуй
      # архив на пользовательской машине и запусти `lighchat_mobile.exe`.
      # Никаких разрешений / Developer Mode / Smart Screen exceptions
      # не требуется. Подходит для бета-тестов / sanity-check.
      - name: Pack portable ZIP
        shell: pwsh
        run: |
          $src = "build/windows/x64/runner/Release"
          $dst = "LighChat-windows-portable.zip"
          Compress-Archive -Path "$src/*" -DestinationPath $dst -CompressionLevel Optimal
          Get-ChildItem $dst

      - uses: actions/upload-artifact@v4
        with:
          name: lighchat-windows-portable
          path: mobile/app/LighChat-windows-portable.zip

      # Inno Setup installer — настоящий Windows installer (.exe), который
      # ставит приложение в Program Files / %LOCALAPPDATA%, регистрирует
      # в «Установка и удаление программ», создаёт shortcut'ы в Start Menu
      # (всегда) и опционально на Desktop / в автозапуск. Без сертификата
      # будет SmartScreen warning при первом запуске installer'а — это
      # нормально для unsigned builds. Подпись Code Signing certificate
      # позже подключим через WINDOWS_CERT_PFX / WINDOWS_CERT_PASSWORD
      # секреты.
      - name: Read app version from pubspec.yaml
        id: read-version
        shell: pwsh
        run: |
          $line = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches.Groups[1].Value
          # pubspec.yaml содержит "1.0.0+1" — Inno Setup ждёт чистую версию.
          $semver = ($line -split '\+')[0].Trim()
          echo "version=$semver" >> $env:GITHUB_OUTPUT
          echo "App version: $semver"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress --limit-output

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=${{ steps.read-version.outputs.version }} windows/installer.iss
          Get-ChildItem windows/LighChat-windows-installer.exe

      - uses: actions/upload-artifact@v4
        with:
          name: lighchat-windows-installer
          path: mobile/app/windows/LighChat-windows-installer.exe

      # MSIX/Code Signing подключатся когда появится EV сертификат
      # (~$300-700/год). До тех пор: portable ZIP + Inno Setup installer.

  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build clang cmake libgtk-3-dev pkg-config \
            liblzma-dev libsecret-1-dev libjsoncpp-dev libnotify-dev \
            libayatana-appindicator3-dev \
            libsqlite3-dev fuse libfuse2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux app
        run: flutter build linux --release

      - name: Package AppImage
        run: |
          curl -L -o appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          # Минимальный AppDir: бинарник + .desktop + иконка.
          # Для production добавьте через appimage-builder с metainfo.xml.
          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          cat > AppDir/lighchat.desktop <<'EOF'
          [Desktop Entry]
          Name=LighChat
          Exec=lighchat_mobile
          Icon=lighchat
          Type=Application
          Categories=Network;InstantMessaging;
          MimeType=x-scheme-handler/lighchat;
          EOF
          cp assets/lighchat_mark.png AppDir/lighchat.png
          ./appimagetool AppDir LighChat-linux.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: lighchat-linux-appimage
          path: mobile/app/LighChat-linux.AppImage

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { merge-multiple: true, path: artifacts }

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
